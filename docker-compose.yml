services:
  postgres:
    image: postgres:16-alpine
    container_name: taxivillage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxivillage
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taxivillage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taxivillage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxivillage-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://user:password@postgres:5432/taxivillage?schema=public
      JWT_SECRET: change_me_local_only_not_for_production
      PORT: 3000
      REDIS_URL: redis://redis:6379
    ports:
      # Host 3001 → avoid conflict when something else already uses Windows port 3000
      - "3001:3000"
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
