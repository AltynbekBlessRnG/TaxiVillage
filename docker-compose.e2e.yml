services:
  postgres-e2e:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxivillage_e2e
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taxivillage_e2e"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-e2e:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
