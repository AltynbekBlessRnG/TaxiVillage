# TaxiVillage — Render Blueprint (FREE tier, no credit card required).
# Trade-off: backend sleeps after ~15 min idle; free Postgres has limits — see docs/deployment.md
# For paid always-on stack, use plan: starter / basic-256mb after adding a card that works with Stripe.
services:
  - type: web
    name: taxivillage-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: taxivillage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: taxivillage-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      # Default hostnames match Render service names; fix in Dashboard if your URLs differ after deploy.
      - key: PUBLIC_BASE_URL
        value: https://taxivillage-backend.onrender.com
      - key: APP_ORIGIN
        value: https://taxivillage-admin.onrender.com
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: OTP_TTL_MINUTES
        value: "10"
      - key: OTP_RESEND_SECONDS
        value: "45"

  - type: keyvalue
    name: taxivillage-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: all
    maxmemoryPolicy: noeviction

  - type: web
    name: taxivillage-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://taxivillage-backend.onrender.com/api

  - type: web
    name: taxivillage-docs
    runtime: static
    rootDir: docs
    buildCommand: "true"
    staticPublishPath: .

databases:
  - name: taxivillage-db
    plan: free
    databaseName: taxivillage
